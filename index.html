<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Assistant Desktop</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="./src/assets/favicon-192x192.png" alt="Logo" />
      </div>
      <div class="login-box">
        <h1 id="welcome-text">Welcome!</h1>
        <p id="sub-text">Please enter the URL of your Home Assistant</p>

        <div class="input-group">
          <input type="text" id="ha-url" placeholder=" " autocomplete="off" />
          <label for="ha-url" id="url-label">URL</label>
        </div>

        <button id="connect-btn">Connect</button>

        <div class="footer">
          <span id="storage-info">ONLY LOCALLY SAVED</span>
        </div>
      </div>

      <div class="bottom-footer">
        <div class="custom-select-wrapper">
          <div class="custom-select" id="lang-select-container">
            <div class="custom-select__trigger">
              <span id="current-lang">English</span>
              <div class="arrow"></div>
            </div>
            <div class="custom-options">
              <span class="custom-option" data-value="en">English</span>
              <span class="custom-option" data-value="de">Deutsch</span>
              <span class="custom-option" data-value="fr">Français</span>
              <span class="custom-option" data-value="es">Español</span>
              <span class="custom-option" data-value="it">Italiano</span>
              <span class="custom-option" data-value="nl">Nederlands</span>
              <span class="custom-option" data-value="pl">Polski</span>
              <span class="custom-option" data-value="pt">Português</span>
              <span class="custom-option" data-value="ru">Русский</span>
              <span class="custom-option" data-value="ja">日本語</span>
              <span class="custom-option" data-value="zh">中文</span>
              <span class="custom-option" data-value="tr">Türkçe</span>
            </div>
          </div>
        </div>

        <a
          href="https://github.com/PsydoV2/home-assistant-desktop"
          target="_blank"
          id="help-link"
        >
          Help
          <svg
            style="
              width: 14px;
              height: 14px;
              vertical-align: middle;
              margin-left: 4px;
            "
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="M14,3V5H17.59L7.76,14.83L9.17,16.24L19,6.41V10H21V3M19,19H5V5H12V3H5C3.89,3 3,3.9 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V12H19V19Z"
            />
          </svg>
        </a>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
